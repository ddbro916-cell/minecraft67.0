<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 2D - Fixed Ground</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        canvas { display: block; }
        .ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 10px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui">
        <b>Управление:</b><br>
        A, D — Ходить | Пробел — Прыжок<br>
        ЛКМ — Ломать | ПКМ — Строить<br>
        1, 2, 3 — Выбор блоков
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const blockSize = 40;
        const world = {};
        
        // ГРАВЕЦЬ
        const player = {
            x: canvas.width / 2, // По центру екрана
            y: 100,
            w: 25,
            h: 55,
            vy: 0,
            speed: 5
        };

        let selectedBlock = 1;

        // ГЕНЕРАЦІЯ СВІТУ (Робимо землю товстою)
        function generate() {
            const groundLevel = 10; // На якому рядку починається земля
            for (let x = -50; x < (canvas.width / blockSize) + 50; x++) {
                for (let y = groundLevel; y < groundLevel + 20; y++) {
                    let type = (y === groundLevel) ? 1 : 2; // 1 - трава, 2 - камінь
                    world[`${x * blockSize},${y * blockSize}`] = type;
                }
            }
        }

        const keys = {};
        window.onkeydown = (e) => {
            keys[e.code] = true;
            if (e.key === "1") selectedBlock = 1;
            if (e.key === "2") selectedBlock = 2;
            if (e.key === "3") selectedBlock = 3;
        };
        window.onkeyup = (e) => keys[e.code] = false;

        window.onmousedown = (e) => {
            // Рахуємо координати клітинки, куди клікнули
            const bx = Math.floor(e.clientX / blockSize) * blockSize;
            const by = Math.floor(e.clientY / blockSize) * blockSize;
            if (e.button === 0) delete world[`${bx},${by}`];
            if (e.button === 2) world[`${bx},${by}`] = selectedBlock;
        };
        window.oncontextmenu = (e) => e.preventDefault();

        function update() {
            if (keys['KeyA']) player.x -= player.speed;
            if (keys['KeyD']) player.x += player.speed;

            player.vy += 0.6; // Гравітація
            player.y += player.vy;

            // Колізія: перевіряємо блок під ногами
            let footX = Math.floor((player.x + player.w / 2) / blockSize) * blockSize;
            let footY = Math.floor((player.y + player.h) / blockSize) * blockSize;

            if (world[`${footX},${footY}`]) {
                player.y = footY - player.h;
                player.vy = 0;
                if (keys['Space']) player.vy = -12; // Стрибок
            }

            // РЕСПАУН (якщо впав нижче екрана)
            if (player.y > canvas.height + 500) {
                player.x = canvas.width / 2;
                player.y = 100;
                player.vy = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Малюємо блоки
            for (let key in world) {
                const [x, y] = key.split(',').map(Number);
                if (world[key] === 1) ctx.fillStyle = "#4caf50"; // Трава
                if (world[key] === 2) ctx.fillStyle = "#757575"; // Камінь
                if (world[key] === 3) ctx.fillStyle = "#795548"; // Дерево
                ctx.fillRect(x, y, blockSize, blockSize);
                ctx.strokeStyle = "rgba(0,0,0,0.1)";
                ctx.strokeRect(x, y, blockSize, blockSize);
            }

            // Малюємо Стіва
            ctx.fillStyle = "#2196f3";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = "#ffdbac"; // Голова
            ctx.fillRect(player.x + 2, player.y - 10, 20, 20);

            update();
            requestAnimationFrame(draw);
        }

        generate();
        draw();
    </script>
</body>
</html>
